name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*"        # triggers on v0.4.0, v1.0.0, etc.
  workflow_dispatch: # allow manual trigger for testing

jobs:
  # ------------------------------------------------------------------ #
  #  Build wheels for every OS / Python combination                     #
  # ------------------------------------------------------------------ #
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest   # Linux x86_64  (manylinux)
          - windows-latest  # Windows x86_64
          - macos-13        # macOS Intel   (x86_64)
          - macos-latest    # macOS Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Python versions to build for
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit and musl builds (no Rust musl target configured)
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

          # --- Linux ---
          # manylinux containers don't have Rust — install it before building.
          CIBW_BEFORE_ALL_LINUX: >-
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
            sh -s -- -y --default-toolchain stable
          CIBW_ENVIRONMENT_LINUX: "PATH=/root/.cargo/bin:$PATH"

          # --- macOS / Windows ---
          # Rust is pre-installed on GitHub-hosted runners — no extra step needed.

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ------------------------------------------------------------------ #
  #  Build source distribution (fallback for unlisted platforms)        #
  # ------------------------------------------------------------------ #
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ------------------------------------------------------------------ #
  #  Publish everything to PyPI once all wheels + sdist are ready       #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing (no API token needed)

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
